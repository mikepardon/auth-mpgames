services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-mpgames-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"
    env_file: .env.production
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    container_name: auth-mpgames-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-auth_mpgames}
      POSTGRES_USER: ${DB_USERNAME:-auth_mpgames}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-auth_mpgames}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  app-storage:
  app-logs:
